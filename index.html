<!DOCTYPE html>
<!-- WARNING: API key is exposed client-side. For local verification only. Do NOT deploy. -->
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI ファシリテーター</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #252836;
    --border: #2e3248;
    --text: #e8eaf6;
    --text-muted: #7b82a8;
    --primary: #5c6bc0;
    --primary-hover: #7986cb;
    --success: #43a047;
    --warning: #ffa726;
    --danger: #ef5350;
    --hand-raised: #f57c00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  button {
    cursor: pointer;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 14px;
    font-family: inherit;
    transition: background 0.15s;
  }

  input, textarea, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 8px 12px;
    width: 100%;
    outline: none;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--primary);
  }

  /* ── Browser warning ── */
  #browser-warning {
    display: none;
    background: var(--danger);
    color: #fff;
    padding: 12px 20px;
    text-align: center;
    font-weight: bold;
  }

  /* ══════════════════════════════
     SETUP SCREEN
  ══════════════════════════════ */
  #screen-setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    min-height: 100vh;
  }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .setup-card h1 {
    font-size: 22px;
    color: var(--text);
  }
  .setup-card h1 span { color: var(--primary); }

  .field label {
    display: block;
    margin-bottom: 6px;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  #agenda-input {
    height: 180px;
    resize: vertical;
  }

  .participant-row {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
  }
  .remove-btn {
    background: var(--surface2);
    color: var(--text-muted);
    padding: 8px 10px;
    flex-shrink: 0;
  }
  .remove-btn:hover { background: var(--danger); color: #fff; }

  #add-participant-btn {
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 13px;
    padding: 6px 12px;
  }
  #add-participant-btn:hover { background: var(--border); color: var(--text); }

  #start-btn {
    background: var(--primary);
    color: #fff;
    font-size: 16px;
    padding: 12px;
    font-weight: 600;
  }
  #start-btn:hover:not(:disabled) { background: var(--primary-hover); }
  #start-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  #setup-spinner { display: none; margin-left: 8px; }

  #setup-error {
    color: var(--danger);
    font-size: 13px;
    white-space: pre-wrap;
  }

  /* ══════════════════════════════
     RUNNING SCREEN
  ══════════════════════════════ */
  #screen-running {
    display: none;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Header */
  .running-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .mic-status {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .mic-status.listening  { background: var(--success); animation: pulse 1.5s infinite; }
  .mic-status.evaluating { background: var(--warning); }
  .mic-status.hand_raised { background: var(--hand-raised); animation: pulse 0.5s infinite; }
  .mic-status.speaking   { background: var(--primary); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #current-item-title {
    font-size: 16px;
    font-weight: 600;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #current-item-timer {
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--success);
    flex-shrink: 0;
    min-width: 70px;
    text-align: right;
  }
  #current-item-timer.overtime { color: var(--danger); }

  /* Agenda nav */
  #agenda-nav {
    display: flex;
    gap: 6px;
    padding: 8px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    flex-shrink: 0;
  }

  .agenda-nav-item {
    background: var(--surface2);
    color: var(--text-muted);
    white-space: nowrap;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 20px;
  }
  .agenda-nav-item:hover { background: var(--border); color: var(--text); }
  .agenda-nav-item.active { background: var(--primary); color: #fff; }

  /* Main area */
  .running-main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Left: transcript */
  .transcript-panel {
    flex: 1.5;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .panel-header {
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #speaker-select {
    font-size: 12px;
    padding: 4px 8px;
    width: auto;
  }

  #transcript {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.8;
  }

  #transcript p { margin-bottom: 4px; }
  #transcript .speaker-tag {
    font-weight: 700;
    color: var(--primary-hover);
    margin-right: 4px;
  }
  #transcript .interim { color: var(--text-muted); }

  /* Right: insights */
  .insights-panel {
    width: 300px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .insights-section {
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    overflow-y: auto;
  }
  .insights-section:last-child { border-bottom: none; flex: 1; }

  .insights-section h3 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .insights-section ul { list-style: none; padding: 0; }
  .insights-section li {
    font-size: 13px;
    padding: 3px 0;
    border-bottom: 1px solid var(--border);
  }
  .insights-section li:last-child { border-bottom: none; }

  /* Hand-raised panel */
  #hand-raised-panel {
    display: none;
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 2px solid var(--hand-raised);
    border-radius: 12px;
    padding: 16px 20px;
    min-width: 340px;
    max-width: 480px;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    z-index: 100;
  }

  .hand-raised-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    color: var(--hand-raised);
    font-size: 13px;
  }

  #hand-raised-message {
    font-size: 15px;
    color: var(--text);
    line-height: 1.6;
  }

  .hand-raised-footer {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    align-items: center;
  }

  #hand-raised-ttl {
    font-size: 12px;
    color: var(--text-muted);
    margin-right: auto;
  }

  #allow-btn {
    background: var(--success);
    color: #fff;
    font-weight: 600;
  }
  #allow-btn:hover { filter: brightness(1.1); }

  #dismiss-btn {
    background: var(--surface2);
    color: var(--text-muted);
  }
  #dismiss-btn:hover { background: var(--danger); color: #fff; }

  /* Footer */
  .running-footer {
    padding: 10px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    flex-shrink: 0;
    position: relative;
  }

  #next-item-btn {
    background: var(--surface2);
    color: var(--text);
  }
  #next-item-btn:hover { background: var(--border); }

  #end-meeting-btn {
    background: var(--danger);
    color: #fff;
    font-weight: 600;
  }
  #end-meeting-btn:hover { filter: brightness(1.1); }

  /* ══════════════════════════════
     ENDED SCREEN
  ══════════════════════════════ */
  #screen-ended {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    min-height: 100vh;
  }

  .ended-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .ended-card h2 {
    font-size: 18px;
  }

  #minutes-output {
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    background: var(--surface2);
    border-radius: 8px;
    padding: 16px;
    min-height: 300px;
    max-height: 60vh;
    overflow-y: auto;
  }

  .ended-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  #copy-btn {
    background: var(--primary);
    color: #fff;
  }
  #copy-btn:hover { background: var(--primary-hover); }

  #download-btn {
    background: var(--surface2);
    color: var(--text);
  }
  #download-btn:hover { background: var(--border); }

  #new-meeting-btn {
    background: var(--surface2);
    color: var(--text-muted);
    margin-left: auto;
  }
  #new-meeting-btn:hover { background: var(--border); color: var(--text); }
</style>
</head>
<body>

<div id="browser-warning">
  ⚠️ このツールは Chrome または Edge が必要です。Safari / Firefox では音声認識が正常に動作しません。
</div>

<!-- ════════════════════════════════
     SCREEN: SETUP
════════════════════════════════ -->
<div id="screen-setup">
  <div class="setup-card">
    <h1>🤝 <span>AI</span> ファシリテーター</h1>

    <div class="field">
      <label>Claude API キー</label>
      <input id="api-key" type="password" placeholder="sk-ant-..." autocomplete="off" />
    </div>

    <div class="field">
      <label>会議の目的・アジェンダ</label>
      <textarea id="agenda-input" placeholder="例：
【目的】来期予算案の審議・承認

【アジェンダ】
1. 開会・前回議事録確認（5分）
2. 今期実績の報告（15分）
3. 来期予算案の説明（20分）
4. 質疑・承認（15分）
5. その他・閉会（5分）"></textarea>
    </div>

    <div class="field">
      <label>参加者（任意）</label>
      <div id="participant-list"></div>
      <button id="add-participant-btn">＋ 参加者を追加</button>
    </div>

    <div id="setup-error"></div>

    <button id="start-btn">
      会議を開始する
      <span id="setup-spinner">⏳</span>
    </button>
  </div>
</div>

<!-- ════════════════════════════════
     SCREEN: RUNNING
════════════════════════════════ -->
<div id="screen-running">
  <div class="running-header">
    <div id="mic-status" class="mic-status listening" title="LISTENING"></div>
    <div id="current-item-title">—</div>
    <div id="current-item-timer">—:——</div>
  </div>

  <div id="agenda-nav"></div>

  <div class="running-main">
    <!-- Transcript -->
    <div class="transcript-panel">
      <div class="panel-header">
        🎙 文字起こし
        <span style="margin-left: auto; font-weight: normal; color: var(--text-muted); font-size: 11px;">話者:</span>
        <select id="speaker-select"></select>
      </div>
      <div id="transcript"></div>
    </div>

    <!-- Insights -->
    <div class="insights-panel">
      <div class="insights-section">
        <h3>✅ 決定事項</h3>
        <ul id="decisions-list"></ul>
      </div>
      <div class="insights-section">
        <h3>📌 アクション</h3>
        <ul id="actions-list"></ul>
      </div>
      <div class="insights-section">
        <h3>❓ 未解決の論点</h3>
        <ul id="questions-list"></ul>
      </div>
    </div>
  </div>

  <!-- Hand-raised panel -->
  <div id="hand-raised-panel">
    <div class="hand-raised-header">🤚 AI が発言を希望しています</div>
    <div id="hand-raised-message"></div>
    <div class="hand-raised-footer">
      <span id="hand-raised-ttl"></span>
      <button id="dismiss-btn">却下 ✕</button>
      <button id="allow-btn">許可 ✓</button>
    </div>
  </div>

  <div class="running-footer">
    <button id="next-item-btn">⏭ 次の項目へ</button>
    <button id="end-meeting-btn">🔴 会議を終了する</button>
  </div>
</div>

<!-- ════════════════════════════════
     SCREEN: ENDED
════════════════════════════════ -->
<div id="screen-ended">
  <div class="ended-card">
    <h2>📝 議事録</h2>
    <div id="minutes-output">生成中...</div>
    <div class="ended-actions">
      <button id="copy-btn">📋 コピー</button>
      <button id="download-btn">⬇ .md ダウンロード</button>
      <button id="new-meeting-btn">↩ 新しい会議を始める</button>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
